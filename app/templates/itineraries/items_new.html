{% extends "base.html" %}

{% block title %}新增活動項目 - TripPlanner{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold mb-4">為「{{ itinerary.title }}」新增活動</h3>
                    <form method="POST" action="{{ url_for('plan.create_itinerary_item', itinerary_id=itinerary.id) }}">
                        
                        <div class="mb-3">
                            <label for="day_number" class="form-label">第幾天 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="day_number" name="day_number" min="1" required placeholder="例如：1 表示第一天">
                        </div>

                        <div class="mb-3">
                            <label for="place_id" class="form-label">選擇景點 (選填，若無請留空以自訂活動)</label>
                            <select class="form-select" id="place_id" name="place_id">
                                <option value="">-- 自訂活動 --</option>
                                {% for place in places %}
                                <option value="{{ place.id }}">{{ place.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="expected_cost" class="form-label">預估花費 (NT$)</label>
                            <input type="number" step="0.01" class="form-control" id="expected_cost" name="expected_cost" value="0" min="0">
                        </div>

                        <div class="mb-4">
                            <label for="note" class="form-label">備註內容</label>
                            <textarea class="form-control" id="note" name="note" rows="3" placeholder="例如：交通方式、門票購買資訊..."></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('plan.itinerary_detail', itinerary_id=itinerary.id) }}" class="btn btn-outline-secondary">取消</a>
                            <button type="submit" class="btn btn-gradient">新增項目</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
