{% extends "base.html" %}

{% block title %}編輯行程 - TripPlanner{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold mb-4">編輯行程設定</h3>
                    <form method="POST" action="{{ url_for('plan.update_itinerary', itinerary_id=itinerary.id) }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">行程名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ itinerary.title }}" required>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label">行程簡介</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ itinerary.description }}</textarea>
                        </div>
                        <div class="mb-4 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="is_shared" name="is_shared" {% if itinerary.is_shared %}checked{% endif %}>
                            <label class="form-check-label" for="is_shared">開啟唯讀分享 (讓朋友透過連結查看)</label>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('plan.itinerary_detail', itinerary_id=itinerary.id) }}" class="btn btn-outline-secondary">取消</a>
                            <button type="submit" class="btn btn-gradient">儲存設定</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
