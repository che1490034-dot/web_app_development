{% extends "base.html" %}

{% block title %}建立新行程 - TripPlanner{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold mb-4">建立新行程</h3>
                    <form method="POST" action="{{ url_for('plan.create_itinerary') }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">行程名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required placeholder="例如：日本京阪神五日遊">
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="start_date" class="form-label">開始日期 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="start_date" name="start_date" required>
                            </div>
                            <div class="col-md-6">
                                <label for="end_date" class="form-label">結束日期 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="end_date" name="end_date" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label">行程簡介</label>
                            <textarea class="form-control" id="description" name="description" rows="3" placeholder="寫下對這趟旅程的期待..."></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('plan.list_itineraries') }}" class="btn btn-outline-secondary">取消</a>
                            <button type="submit" class="btn btn-gradient">建立行程</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
