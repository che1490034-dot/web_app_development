{% extends "base.html" %}

{% block title %}登入 - TripPlanner{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-hover">
                <div class="card-body p-5">
                    <h2 class="text-center fw-bold mb-4">歡迎回來</h2>
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">電子郵件</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">密碼</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100 mb-3">登入</button>
                    </form>
                    <div class="text-center text-muted">
                        還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-decoration-none">立即註冊</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
